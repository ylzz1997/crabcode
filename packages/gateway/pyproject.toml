[project]
name = "crabcode-gateway"
version = "0.1.0"
description = "CrabCode Gateway - multi-protocol (HTTP/gRPC) server for CrabCode"
requires-python = ">=3.10"
dependencies = [
    "crabcode-core>=0.1.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "grpcio>=1.65.0",
    "grpcio-health-checking>=1.65.0",
    "sse-starlette>=2.0.0",
    "pydantic>=2.0.0",
    "websockets>=13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crabcode_gateway"]
