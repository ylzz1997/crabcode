[project]
name = "crabcode-cli"
version = "0.1.0"
description = "CrabCode CLI - terminal frontend for CrabCode"
requires-python = ">=3.10"
dependencies = [
    "crabcode-core>=0.1.0",
    "typer>=0.12.0",
    "rich>=13.0.0",
    "prompt-toolkit>=3.0.0",
]

[project.scripts]
crabcode = "crabcode_cli.app:entry"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crabcode_cli"]
