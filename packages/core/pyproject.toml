[project]
name = "crabcode-core"
version = "0.1.1"
description = "CrabCode core library - AI coding assistant engine"
requires-python = ">=3.10"
dependencies = [
    "anthropic>=0.40.0",
    "openai>=1.50.0",
    "pydantic>=2.0.0",
    "mcp>=1.0.0",
    "httpx>=0.27.0",
    "tiktoken>=0.7.0",
]

[project.optional-dependencies]
browser = ["playwright>=1.48.0"]
bedrock = ["anthropic[bedrock]>=0.40.0"]
vertex = ["anthropic[vertex]>=0.40.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["crabcode_core"]
