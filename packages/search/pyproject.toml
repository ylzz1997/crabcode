[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "crabcode-search"
version = "0.1.0"
description = "Semantic codebase search for CrabCode"
requires-python = ">=3.11"
dependencies = [
    "crabcode-core>=0.1.0",
    "usearch>=2.12.0",
    "httpx>=0.27.0",
    "tree-sitter-language-pack>=1.0.0",
    "openai>=1.50.0",
    "sentence-transformers>=2.0.0",
    "modelscope>=1.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["crabcode_search"]
